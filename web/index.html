<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gharsewa - Home Services Platform. Connect with trusted service providers for all your home service needs.">
  <meta name="keywords" content="home services, service provider, booking, gharsewa">
  <meta name="author" content="Gharsewa">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gharsewa - Home Services Platform">
  <meta property="og:description" content="Connect with trusted service providers for all your home service needs.">
  <meta property="og:url" content="https://gharsewa.com">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gharsewa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gharsewa - Home Services Platform</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase SDK for Web Authentication -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }
    #loading img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
    }
    #loading p {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Loading screen shown while Flutter initializes -->
  <div id="loading">
    <p>Loading Gharsewa...</p>
  </div>

  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
