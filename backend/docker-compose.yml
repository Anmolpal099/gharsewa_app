version: '3.8'

services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Mount entire project for development (allows live code changes)
      - .:/var/www
      # Override vendor directory to use container's version
      - /var/www/vendor
      # Override node_modules if you have any
      - /var/www/node_modules
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-gharsewa}
      - DB_USERNAME=${DB_USERNAME:-gharsewa_user}
      - DB_PASSWORD=${DB_PASSWORD:-gharsewa_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=${OLLAMA_HOST:-http://gharsewa_ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3-vl:2b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-60}
      - OLLAMA_MAX_TOKENS=${OLLAMA_MAX_TOKENS:-2048}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.7}
      - OLLAMA_TOP_P=${OLLAMA_TOP_P:-0.9}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-3}
      - AI_RETRY_DELAY=${AI_RETRY_DELAY:-1000}
      - AI_CACHE_TTL=${AI_CACHE_TTL:-3600}
    env_file:
      - .env
    networks:
      - gharsewa_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: gharsewa_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - gharsewa_network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: gharsewa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gharsewa}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USERNAME:-gharsewa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gharsewa_password}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - gharsewa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gharsewa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - gharsewa_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel WebSockets
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_websocket
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start
    ports:
      - "6001:6001"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - gharsewa_network
    depends_on:
      - app
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - gharsewa_network
    depends_on:
      - app
      - redis

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - gharsewa_network
    depends_on:
      - app

networks:
  gharsewa_network:
    driver: bridge
    name: backend_gharsewa_network

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
