version: '3.8'

services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - gharsewa_network
    depends_on:
      - db
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: gharsewa_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - gharsewa_network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: gharsewa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gharsewa}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USERNAME:-gharsewa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gharsewa_password}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - gharsewa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gharsewa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - gharsewa_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel WebSockets
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_websocket
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan websockets:serve
    ports:
      - "6001:6001"
    volumes:
      - .:/var/www
    networks:
      - gharsewa_network
    depends_on:
      - app
      - redis

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
    networks:
      - gharsewa_network
    depends_on:
      - app
      - redis

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gharsewa_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - gharsewa_network
    depends_on:
      - app

networks:
  gharsewa_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
